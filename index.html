  .manga-title { font-size: 1.1em; font-weight: bold; color: #e94560; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
  .progress { font-size: 0.85em; color: #aaa; margin-bottom: 10px; }
  .ep-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .ep {
    display: inline-block;
    padding: 6px 12px;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #7ec8e3;
    text-decoration: none;
    font-size: 0.9em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ep:hover { background: #0f3460; }
  .ep.read {
    background: #1b4332;
    border-color: #2d6a4f;
    color: #95d5b2;
  }
  .ep.read::after { content: ' ✓'; }
  .controls { margin-top: 15px; }
  .controls button {
    background: #333;
    color: #aaa;
    border: 1px solid #555;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8em;
  }
  .controls button:hover { background: #444; color: #fff; }
</style>

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function render() {
  const state = loadState();
  const app = document.getElementById('app');
  app.innerHTML = '';

  manga.forEach(m => {
    const section = document.createElement('div');
    section.className = 'manga-section';

    const key = m.title;
    if (!state[key]) state[key] = {};

    const readCount = Object.values(state[key]).filter(Boolean).length;
    const total = m.episodes.length;

    section.innerHTML = `
      <div class="manga-title">${m.title}</div>
      <div class="progress">${readCount}/${total} 話 既読 ・ ${m.startInfo}</div>
    `;

    const list = document.createElement('div');
    list.className = 'ep-list';

    m.episodes.forEach(e => {
      const a = document.createElement('a');
      a.textContent = `${e.ep}話`;
      a.title = e.issue;
      a.className = 'ep' + (state[key][e.ep] ? ' read' : '');

      if (e.url) {
        a.href = e.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.addEventListener('click', () => {
          state[key][e.ep] = true;
          saveState(state);
          setTimeout(render, 100);
        });
      } else {
        a.style.opacity = '0.4';
        a.style.cursor = 'default';
        a.title = e.issue + '（URL未登録）';
      }

      list.appendChild(a);
    });

    section.appendChild(list);

    const controls = document.createElement('div');
    controls.className = 'controls';
    const resetBtn = document.createElement('button');
    resetBtn.textContent = 'リセット';
    resetBtn.addEventListener('click', () => {
      if (confirm(`${m.title} の既読をリセットしますか？`)) {
        state[key] = {};
        saveState(state);
        render();
      }
    });
    controls.appendChild(resetBtn);
    section.appendChild(controls);

    app.appendChild(section);
  });
}
