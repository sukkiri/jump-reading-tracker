function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function buildSection(m, state) {
  const section = document.createElement('div');
  section.className = 'manga-section' + (m.done ? ' done' : '');

  const key = m.title;
  if (!state[key]) state[key] = {};

  const readCount = Object.values(state[key]).filter(Boolean).length;
  const total = m.episodes.length;

  section.innerHTML = `
    <div class="manga-title">${m.title}</div>
    <div class="progress">${readCount}/${total} 話 既読 ・ ${m.startInfo}</div>
  `;

  const list = document.createElement('div');
  list.className = 'ep-list';

  m.episodes.forEach(e => {
    const a = document.createElement('a');
    a.textContent = `${e.ep}話`;
    a.title = e.issue;
    a.className = 'ep' + (state[key][e.ep] ? ' read' : '');

    if (e.url) {
      a.href = e.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.addEventListener('click', () => {
        state[key][e.ep] = true;
        saveState(state);
        setTimeout(render, 100);
      });
    } else {
      a.style.opacity = '0.4';
      a.style.cursor = 'default';
      a.title = e.issue + '（URL未登録）';
    }

    list.appendChild(a);
  });

  section.appendChild(list);

  const controls = document.createElement('div');
  controls.className = 'controls';
  const resetBtn = document.createElement('button');
  resetBtn.textContent = 'リセット';
  resetBtn.addEventListener('click', () => {
    if (confirm(`${m.title} の既読をリセットしますか？`)) {
      state[key] = {};
      saveState(state);
      render();
    }
  });
  controls.appendChild(resetBtn);
  section.appendChild(controls);

  return section;
}

function render() {
  const state = loadState();
  const app = document.getElementById('app');
  app.innerHTML = '';

  const active = manga.filter(m => !m.done);
  const done = manga.filter(m => m.done);

  active.forEach(m => app.appendChild(buildSection(m, state)));

  if (done.length) {
    const doneArea = document.createElement('div');
    doneArea.className = 'done-section';

    const header = document.createElement('div');
    header.className = 'section-header done-toggle';
    header.textContent = `読了済み（${done.length}作品）`;
    header.addEventListener('click', () => {
      header.classList.toggle('open');
      body.classList.toggle('open');
    });

    const body = document.createElement('div');
    body.className = 'done-body';
    done.forEach(m => body.appendChild(buildSection(m, state)));

    doneArea.appendChild(header);
    doneArea.appendChild(body);
    app.appendChild(doneArea);
  }
}

render();
